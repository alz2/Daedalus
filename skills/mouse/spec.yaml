id: mouse
version: 0.2.0
kind: atomic
description: 'General-purpose mouse skill: move without clicking, click (left/right/double),
  or drag from point A to point B with configurable speed.'
side_effects:
- screen_input
preconditions:
- backend.connected
- 0 <= x < screen.width
- 0 <= y < screen.height
postconditions:
- cursor.position == (x, y) or cursor.position == (x2, y2) for drag
examples:
- inputs:
    action: move
    x: 400
    y: 300
  expected:
    action: move
    position:
    - 400
    - 300
- inputs:
    action: click
    x: 100
    y: 200
  expected:
    action: click
    position:
    - 100
    - 200
    button: left
    double: false
- inputs:
    action: drag
    x: 100
    y: 100
    x2: 500
    y2: 300
  expected:
    action: drag
    start:
    - 100
    - 100
    end:
    - 500
    - 300
    button: left
- inputs:
    action: drag
    x: 200
    y: 200
    x2: 600
    y2: 400
    speed: 400
  expected:
    action: drag
    start:
    - 200
    - 200
    end:
    - 600
    - 400
    button: left
tests:
- basic.json
tags:
- mouse
- input
- core
